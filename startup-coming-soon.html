<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShipFast — Despliega tu Código en un Clic</title>
  <meta name="description" content="La forma más rápida de llevar apps de tu terminal a producción. Próximamente.">
  <meta property="og:title" content="ShipFast — Despliega tu Código en un Clic">
  <meta property="og:description" content="La forma más rápida de llevar apps de tu terminal a producción. Próximamente.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./dist/css/main.css">
  <style>
    :root {
      --sf-bg: #050510;
      --sf-cyan: #06b6d4;
      --sf-blue: #3b82f6;
      --sf-text: #e2e8f0;
      --sf-muted: #64748b;
      --sf-surface: rgba(255, 255, 255, 0.04);
      --sf-border: rgba(255, 255, 255, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--sf-bg);
      color: var(--sf-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Background layers ─────────────────── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .bg-vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, var(--sf-bg) 100%);
      z-index: 1;
    }

    .orb {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      filter: blur(100px);
      opacity: 0.4;
    }

    .orb-primary {
      background: radial-gradient(circle, var(--sf-cyan), var(--sf-blue), transparent);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .orb-secondary {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--sf-blue), transparent);
      top: 30%;
      left: 60%;
      transform: translate(-50%, -50%);
      opacity: 0.2;
    }

    /* ── Floating particles ────────────────── */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: var(--sf-cyan);
      border-radius: 50%;
      z-index: 2;
      opacity: 0;
    }

    /* ── Main content ──────────────────────── */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 640px;
      padding: 2rem;
      width: 100%;
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateY(-20px);
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--sf-cyan), var(--sf-blue));
      font-size: 1.125rem;
    }

    /* Tagline */
    .tagline {
      margin-top: 2.5rem;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      overflow: hidden;
    }

    .tagline .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(40px);
    }

    .tagline .highlight {
      background: linear-gradient(135deg, var(--sf-cyan), var(--sf-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Cursor blink */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: var(--sf-cyan);
      margin-left: 4px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Description */
    .description {
      margin-top: 1.5rem;
      font-size: 1.125rem;
      font-weight: 300;
      color: var(--sf-muted);
      line-height: 1.6;
      opacity: 0;
      transform: translateY(20px);
    }

    /* ── Countdown ─────────────────────────── */
    .countdown {
      margin-top: 3rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      opacity: 0;
      transform: scale(0.8);
    }

    .countdown-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }

    .countdown-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(180deg, var(--sf-text) 0%, var(--sf-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    .countdown-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--sf-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-top: 0.5rem;
    }

    .countdown-separator {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--sf-muted);
      opacity: 0.3;
      align-self: flex-start;
      padding-top: 0.25rem;
    }

    /* ── Email capture ─────────────────────── */
    .email-form {
      margin-top: 3rem;
      display: flex;
      gap: 0;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--sf-border);
      background: var(--sf-surface);
      opacity: 0;
      transform: translateY(20px);
      transition: border-color 0.3s;
    }

    .email-form:focus-within {
      border-color: rgba(6, 182, 212, 0.3);
      box-shadow: 0 0 30px rgba(6, 182, 212, 0.08);
    }

    .email-input {
      flex: 1;
      padding: 0.875rem 1.25rem;
      background: transparent;
      border: none;
      color: var(--sf-text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      outline: none;
    }

    .email-input::placeholder {
      color: var(--sf-muted);
      opacity: 0.6;
    }

    .email-btn {
      padding: 0.875rem 1.5rem;
      background: linear-gradient(135deg, var(--sf-cyan), var(--sf-blue));
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.3s;
    }

    .email-btn:hover {
      opacity: 0.85;
    }

    /* ── Social links ──────────────────────── */
    .socials {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--sf-border);
      background: var(--sf-surface);
      color: var(--sf-muted);
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(15px);
    }

    .social-link:hover {
      color: var(--sf-cyan);
      border-color: rgba(6, 182, 212, 0.3);
      background: rgba(6, 182, 212, 0.06);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(6, 182, 212, 0.1);
    }

    .social-link svg {
      width: 20px;
      height: 20px;
    }

    /* ── Back to hub button ────────────────── */
    .back-hub {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      z-index: 50;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--sf-border);
      background: rgba(5, 5, 16, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--sf-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.3s ease;
      opacity: 0;
    }

    .back-hub:hover {
      color: var(--sf-text);
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(5, 5, 16, 0.9);
    }

    .back-hub svg {
      width: 16px;
      height: 16px;
    }

    /* ── Bottom line ───────────────────────── */
    .bottom-line {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--sf-cyan), var(--sf-blue), transparent);
      opacity: 0.2;
      z-index: 5;
    }

    /* ── Responsive ────────────────────────── */
    @media (max-width: 480px) {
      .countdown { gap: 0.5rem; }
      .countdown-block { min-width: 60px; }
      .countdown-separator { font-size: 1.5rem; }
      .email-form { flex-direction: column; border-radius: 12px; }
      .email-btn { border-radius: 0; }
    }

    /* ── Reduced motion ────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; opacity: 1; }
      .logo, .tagline .word, .description, .countdown, .email-form, .social-link, .back-hub {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>
  <div class="orb orb-primary" aria-hidden="true"></div>
  <div class="orb orb-secondary" aria-hidden="true"></div>

  <!-- Particles -->
  <div class="particle" style="top:20%;left:15%" aria-hidden="true"></div>
  <div class="particle" style="top:70%;left:80%" aria-hidden="true"></div>
  <div class="particle" style="top:40%;left:90%" aria-hidden="true"></div>
  <div class="particle" style="top:80%;left:25%" aria-hidden="true"></div>
  <div class="particle" style="top:15%;left:70%" aria-hidden="true"></div>
  <div class="particle" style="top:60%;left:10%" aria-hidden="true"></div>
  <div class="particle" style="top:35%;left:50%" aria-hidden="true"></div>
  <div class="particle" style="top:90%;left:60%" aria-hidden="true"></div>

  <!-- Content -->
  <div class="content">

    <!-- Logo -->
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span>ShipFast</span>
    </div>

    <!-- Tagline -->
    <h1 class="tagline">
      <span class="word">Despliega</span>
      <span class="word">tu</span>
      <span class="word">código</span>
      <span class="word highlight">en&nbsp;un</span>
      <span class="word highlight">clic</span><span class="cursor"></span>
    </h1>

    <!-- Description -->
    <p class="description">
      La forma más rápida de llevar apps de tu terminal a producción.<br>
      Sin configuración. Rollbacks instantáneos. CDN global en el edge.
    </p>

    <!-- Countdown -->
    <div class="countdown">
      <div class="countdown-block">
        <span class="countdown-number" id="days">00</span>
        <span class="countdown-label">días</span>
      </div>
      <span class="countdown-separator">:</span>
      <div class="countdown-block">
        <span class="countdown-number" id="hours">00</span>
        <span class="countdown-label">horas</span>
      </div>
      <span class="countdown-separator">:</span>
      <div class="countdown-block">
        <span class="countdown-number" id="minutes">00</span>
        <span class="countdown-label">min</span>
      </div>
      <span class="countdown-separator">:</span>
      <div class="countdown-block">
        <span class="countdown-number" id="seconds">00</span>
        <span class="countdown-label">seg</span>
      </div>
    </div>

    <!-- Email -->
    <form class="email-form" onsubmit="return false;">
      <input type="email" class="email-input" placeholder="tu@empresa.dev" aria-label="Dirección de correo electrónico">
      <button type="submit" class="email-btn">Notifícame</button>
    </form>

    <!-- Socials -->
    <div class="socials">
      <a href="#" class="social-link" aria-label="X (Twitter)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <a href="#" class="social-link" aria-label="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
      </a>
      <a href="#" class="social-link" aria-label="Discord">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      </a>
    </div>
  </div>

  <!-- Back to hub -->
  <a href="./index.html" class="back-hub" aria-label="Volver al hub">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Hub
  </a>

  <!-- Bottom accent line -->
  <div class="bottom-line" aria-hidden="true"></div>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

  <script>
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // ── Countdown ──────────────────────────
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 30);

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) return;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');

      const pad = n => String(n).padStart(2, '0');

      // Animate only the changing number
      [
        [daysEl, pad(days)],
        [hoursEl, pad(hours)],
        [minutesEl, pad(minutes)],
        [secondsEl, pad(seconds)]
      ].forEach(([el, val]) => {
        if (el.textContent !== val) {
          if (!prefersReducedMotion) {
            gsap.to(el, {
              opacity: 0,
              y: -8,
              duration: 0.15,
              ease: 'power2.in',
              onComplete: () => {
                el.textContent = val;
                gsap.fromTo(el,
                  { opacity: 0, y: 8 },
                  { opacity: 1, y: 0, duration: 0.25, ease: 'power2.out' }
                );
              }
            });
          } else {
            el.textContent = val;
          }
        }
      });
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ── GSAP Animations ────────────────────
    if (!prefersReducedMotion) {

      // Orb drift
      gsap.to('.orb-primary', {
        x: 30,
        y: -20,
        duration: 8,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
      });

      gsap.to('.orb-secondary', {
        x: -40,
        y: 30,
        duration: 10,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
      });

      // Orb pulse
      gsap.to('.orb-primary', {
        opacity: 0.5,
        scale: 1.1,
        duration: 4,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
      });

      // Particles float
      gsap.utils.toArray('.particle').forEach((p, i) => {
        gsap.to(p, {
          opacity: gsap.utils.random(0.2, 0.6),
          duration: gsap.utils.random(1, 2),
          delay: gsap.utils.random(0, 3),
          ease: 'power2.out',
        });
        gsap.to(p, {
          y: gsap.utils.random(-30, 30),
          x: gsap.utils.random(-20, 20),
          duration: gsap.utils.random(4, 8),
          repeat: -1,
          yoyo: true,
          ease: 'sine.inOut',
          delay: gsap.utils.random(0, 2),
        });
      });

      // ── Entry sequence ───────────────────
      const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

      // Logo
      tl.to('.logo', {
        opacity: 1,
        y: 0,
        duration: 0.8,
      }, 0.3);

      // Tagline words
      tl.to('.tagline .word', {
        opacity: 1,
        y: 0,
        duration: 0.7,
        stagger: 0.08,
      }, 0.6);

      // Description
      tl.to('.description', {
        opacity: 1,
        y: 0,
        duration: 0.8,
      }, 1.2);

      // Countdown
      tl.to('.countdown', {
        opacity: 1,
        scale: 1,
        duration: 0.9,
        ease: 'back.out(1.5)',
      }, 1.4);

      // Email form
      tl.to('.email-form', {
        opacity: 1,
        y: 0,
        duration: 0.8,
      }, 1.7);

      // Social links
      tl.to('.social-link', {
        opacity: 1,
        y: 0,
        duration: 0.6,
        stagger: 0.1,
      }, 2.0);

      // Back to hub
      tl.to('.back-hub', {
        opacity: 1,
        duration: 0.6,
      }, 2.3);
    }
  </script>

</body>
</html>
